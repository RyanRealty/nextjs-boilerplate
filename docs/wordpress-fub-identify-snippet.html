<!--
  ============================================================================
  Ryan Realty — WordPress FUB Identify Snippet
  Target: AgentFire admin → Site Settings → Header/Footer Scripts & Metas
          → "Body before closing tag" slot
  Endpoint it talks to: https://ryanrealty.vercel.app/api/fub/identify
  Generated: 2026-05-07

  WHAT IT DOES
  ----------------------------------------------------------------------------
  1. Loads Google Identity Services and fires Google One Tap on page load.
     Any visitor signed into Google sees "Continue as <Name>" within ~1s.
  2. Renders a small "Continue with Facebook" widget bottom-right for FB users
     (currently gated off until the Facebook app passes app review).
  3. On auth success, POSTs the verified ID token / access token to the
     Vercel /api/fub/identify endpoint, which verifies the token server-side
     and matches the visitor against Follow Up Boss.
  4. Stores the FUB person id in a first-party cookie `rr_identified=<id>` for
     30 days. Subsequent page loads use this id to fire page-tracking events
     without redoing the OAuth handshake.
  5. ON EVERY PAGE LOAD (after identification) fires POST /api/fub/track-page
     with the current page URL, title, and any listing metadata extracted
     from JSON-LD RealEstateListing schema. The endpoint dispatches to the
     existing FUB helpers:
        - listing detail page → "Viewed Property" event with property fields
        - any other page      → "Viewed Page" event
  6. Shows a brief "Welcome back, <FirstName>" toast when FUB returns matched.

  WHAT IT DOES NOT DO
  ----------------------------------------------------------------------------
  - Does not pass any visitor email or PII over the wire to the endpoint —
    only the OAuth token. The endpoint extracts email from the verified token.
  - Does not auto-fill forms, log in to Supabase, or set Supabase cookies.
    This is identification, not authentication into the Vercel app.
  - No copy of the user's data is stored in WordPress. FUB is the system of
    record.
  ============================================================================
-->

<!-- Configuration. Public client IDs only; secrets live on the Vercel server. -->
<script>
  window.RR_FUB_IDENTIFY = {
    identifyEndpoint: 'https://ryanrealty.vercel.app/api/fub/identify',
    trackEndpoint: 'https://ryanrealty.vercel.app/api/fub/track-page',
    // Legacy alias kept for backwards-compat with older inline scripts.
    endpoint: 'https://ryanrealty.vercel.app/api/fub/identify',
    googleClientId: '725620954432-aq83t2skspo1qgk0jjhs608etgb2o9ar.apps.googleusercontent.com',
    facebookAppId: '901712509522992',
    cookieName: 'rr_identified',
    cookieDays: 30,
    // Facebook app passed app review (Matt 2026-05-07). Both email and
    // public_profile permissions confirmed status="live" via Graph API.
    // Persistent FB Login button is now rendered for visitors who don't
    // have a Google session in this browser.
    enableFacebookButton: true,
  };
</script>

<!-- Google Identity Services (One Tap) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Facebook SDK -->
<div id="fb-root"></div>
<script>
  window.fbAsyncInit = function() {
    if (!window.FB) return;
    FB.init({
      appId: window.RR_FUB_IDENTIFY.facebookAppId,
      cookie: false,
      xfbml: false,
      version: 'v18.0'
    });
  };
</script>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>

<!-- Identify logic -->
<script>
(function() {
  var cfg = window.RR_FUB_IDENTIFY;

  function getCookie(name) {
    var match = document.cookie.split('; ').find(function(r) { return r.indexOf(name + '=') === 0; });
    return match ? match.split('=')[1] : null;
  }

  function setCookie(name, value, days) {
    var exp = new Date();
    exp.setTime(exp.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + '=' + value + '; expires=' + exp.toUTCString() + '; path=/; SameSite=Lax; Secure';
  }

  // ---------- Source attribution (UTM + referrer + landing) ----------
  // Captured ONCE per session-storage life on the visitor's first hit, then
  // reused on every subsequent page so every event in FUB carries the same
  // attribution. Without this, only the landing page would have UTMs and
  // every page after would look "direct".
  function captureSource() {
    var STORAGE_KEY = 'rr_source_v1';
    try {
      var stored = sessionStorage.getItem(STORAGE_KEY);
      if (stored) return JSON.parse(stored);
    } catch (e) {}
    var url, params;
    try { url = new URL(window.location.href); params = url.searchParams; }
    catch (e) { params = new URLSearchParams(); }
    var src = {
      utmSource: params.get('utm_source') || undefined,
      utmMedium: params.get('utm_medium') || undefined,
      utmCampaign: params.get('utm_campaign') || undefined,
      utmTerm: params.get('utm_term') || undefined,
      utmContent: params.get('utm_content') || undefined,
      referrer: document.referrer || undefined,
      landingPage: window.location.href,
      capturedAt: new Date().toISOString()
    };
    // If no UTM, infer source from referrer host so FB / Google / IG / etc.
    // are still attributed even when the link doesn't carry tracking params.
    if (!src.utmSource && src.referrer) {
      var refHost = '';
      try { refHost = new URL(src.referrer).hostname.toLowerCase(); } catch (e) {}
      if (/(^|\.)facebook\.com$|(^|\.)fb\.com$/.test(refHost) || /facebook/.test(refHost)) {
        src.utmSource = 'facebook'; src.utmMedium = src.utmMedium || 'social';
      } else if (/(^|\.)instagram\.com$/.test(refHost) || /instagram/.test(refHost)) {
        src.utmSource = 'instagram'; src.utmMedium = src.utmMedium || 'social';
      } else if (/(^|\.)google\./.test(refHost)) {
        src.utmSource = 'google'; src.utmMedium = src.utmMedium || 'organic';
      } else if (/(^|\.)bing\./.test(refHost) || /(^|\.)duckduckgo\./.test(refHost)) {
        src.utmSource = refHost.replace(/^www\./, '').split('.')[0]; src.utmMedium = src.utmMedium || 'organic';
      } else if (/youtube/.test(refHost)) {
        src.utmSource = 'youtube'; src.utmMedium = src.utmMedium || 'social';
      } else if (/linkedin/.test(refHost)) {
        src.utmSource = 'linkedin'; src.utmMedium = src.utmMedium || 'social';
      } else if (/x\.com$|twitter/.test(refHost)) {
        src.utmSource = 'twitter'; src.utmMedium = src.utmMedium || 'social';
      } else if (/tiktok/.test(refHost)) {
        src.utmSource = 'tiktok'; src.utmMedium = src.utmMedium || 'social';
      } else if (/zillow|realtor|trulia|redfin/.test(refHost)) {
        src.utmSource = refHost.replace(/^www\./, '').split('.')[0]; src.utmMedium = src.utmMedium || 'portal';
      } else if (refHost && refHost !== window.location.hostname) {
        src.utmSource = refHost; src.utmMedium = src.utmMedium || 'referral';
      }
    }
    if (!src.utmSource) {
      src.utmSource = 'direct'; src.utmMedium = src.utmMedium || 'none';
    }
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(src)); } catch (e) {}
    return src;
  }

  function buildCampaign(src) {
    var c = {};
    if (src.utmSource) c.source = src.utmSource;
    if (src.utmMedium) c.medium = src.utmMedium;
    if (src.utmCampaign) c.campaign = src.utmCampaign;
    if (src.utmTerm) c.term = src.utmTerm;
    if (src.utmContent) c.content = src.utmContent;
    return Object.keys(c).length > 0 ? c : undefined;
  }

  // ---------- Page categorization + intent tagging ----------
  // Maps the current URL to a category + a set of FUB tags so Matt can filter
  // and segment people by intent in the FUB UI without configuring per-event
  // automations. Tags are merged (never replaced) so the visitor accumulates
  // signals as they explore.
  function categorizePage() {
    var p = (window.location.pathname || '/').toLowerCase();
    // Listing detail (real AgentFire IDX shape)
    if (/\/listing\/[a-z0-9_-]+\/[a-z0-9_-]+/i.test(p)) {
      return { category: 'listing_detail', intentTags: ['Property View'] };
    }
    // Property search index
    if (/^\/properties\/?/.test(p)) {
      return { category: 'search', intentTags: ['Active Search'] };
    }
    // Seller intent — high-value pages for "I want to sell my house"
    if (/\/free-home-valuation|\/sellers(\/|$)|\/seller-plans|\/past-sales|\/whats-my-home-worth/.test(p)) {
      return { category: 'seller_intent', intentTags: ['Seller Intent'] };
    }
    // Buyer intent — high-value pages for "I'm looking to buy"
    if (/\/buyers(\/|$)|\/relocation|\/featured-listings|\/explore/.test(p)) {
      return { category: 'buyer_intent', intentTags: ['Buyer Intent'] };
    }
    // Financial tools (mortgage)
    if (/\/mortgage-calculator|\/affordability/.test(p)) {
      return { category: 'financial_tools', intentTags: ['Mortgage Interest'] };
    }
    // Area / community guide
    var areaMatch = p.match(/\/area-guides?\/([a-z0-9_-]+)/);
    if (areaMatch) {
      var pretty = areaMatch[1].replace(/-/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      return { category: 'area_guide', intentTags: ['Area: ' + pretty.slice(0, 60)] };
    }
    // Blog
    if (/^\/blog/.test(p)) {
      return { category: 'blog', intentTags: ['Blog Reader'] };
    }
    // About-ish pages
    if (/\/about|\/testimonials|\/contact|\/team|\/giving-back|\/join-us/.test(p)) {
      return { category: 'about', intentTags: [] };
    }
    if (p === '/' || p === '') return { category: 'home', intentTags: [] };
    return { category: 'other', intentTags: [] };
  }

  // ---------- Ad-audience hooks ----------
  // Push to GTM dataLayer + fire a Facebook Pixel custom event so Matt can
  // build retargeting audiences ("People who viewed a Bend listing", "People
  // with seller intent", "Identified leads") without server-side work.
  // Both window.fbq and window.dataLayer are already on this site.
  function pushDataLayer(payload) {
    try {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push(payload);
    } catch (e) {}
  }
  function fbPixelEvent(name, params) {
    if (typeof window.fbq !== 'function') return;
    try { window.fbq('trackCustom', name, params || {}); } catch (e) {}
  }

  function identify(payload) {
    var src = captureSource();
    var campaign = buildCampaign(src);
    return fetch(cfg.identifyEndpoint || cfg.endpoint, {
      method: 'POST',
      mode: 'cors',
      credentials: 'omit',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider: payload.provider,
        idToken: payload.idToken,
        accessToken: payload.accessToken,
        sourceUrl: window.location.href,
        campaign: campaign,
        landingPage: src.landingPage,
        referrer: src.referrer,
      }),
    })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data && data.ok && data.fubPersonId) {
          // Store the FUB person id in the cookie so subsequent page loads
          // can fire /api/fub/track-page without redoing the OAuth handshake.
          setCookie(cfg.cookieName, String(data.fubPersonId), cfg.cookieDays);
          hideSignInModal({ keepDismissFlag: false });
          if (data.matched && data.firstName) {
            showWelcomeBack(data.firstName);
          }
          // Push to GTM dataLayer + FB Pixel for ad audience building.
          pushDataLayer({
            event: 'rr_identified',
            rr_fub_person_id: data.fubPersonId,
            rr_matched: !!data.matched,
            rr_provider: payload.provider,
            rr_source: src.utmSource,
            rr_medium: src.utmMedium,
            rr_campaign: src.utmCampaign,
          });
          fbPixelEvent('Lead', {
            source: src.utmSource,
            medium: src.utmMedium,
            campaign: src.utmCampaign,
            provider: payload.provider,
          });
          // Log the current page as a Viewed Page / Viewed Property event.
          // First-page-of-session tracking — without this, brand-new visitors
          // would have a Registration event but no Viewed Page on landing.
          trackPage(data.fubPersonId);
        }
      })
      .catch(function(err) { /* swallow — never block the page */ });
  }

  function showWelcomeBack(name) {
    if (document.getElementById('rr-welcome-toast')) return;
    var toast = document.createElement('div');
    toast.id = 'rr-welcome-toast';
    toast.style.cssText = [
      'position:fixed', 'bottom:24px', 'right:24px', 'z-index:99999',
      'background:#102742', 'color:#F2EBDD', 'padding:14px 20px',
      'border-radius:12px',
      'font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif',
      'font-size:14px', 'font-weight:500',
      'box-shadow:0 8px 24px rgba(0,0,0,0.25)',
      'max-width:320px', 'opacity:0', 'transition:opacity 200ms ease'
    ].join(';');
    toast.textContent = 'Welcome back, ' + name + '.';
    document.body.appendChild(toast);
    requestAnimationFrame(function() { toast.style.opacity = '1'; });
    setTimeout(function() {
      toast.style.opacity = '0';
      setTimeout(function() { toast.remove(); }, 250);
    }, 4500);
  }

  // ---------- Sign-in modal (single popup, both providers) ----------
  // Matches the Vercel app's AuthModal aesthetic: centered card, subtle
  // backdrop blur, one provider per row, outline-button style with the
  // official provider icon. Shown ONCE per session for non-identified
  // visitors; dismissable via X or ESC. Accumulates dismiss-state in
  // sessionStorage so refreshing doesn't re-popup.
  function showSignInModal() {
    if (!cfg.enableFacebookButton && !window.google) return; // nothing to show
    if (document.getElementById('rr-signin-modal')) return; // already open
    try {
      if (sessionStorage.getItem('rr_signin_dismissed') === '1') return;
    } catch (e) {}

    // FONT-FAMILY ISOLATION — the host site's CSS reset/h2 styling will
    // bleed in unless we force every modal element to use a system sans
    // explicitly. Doing it both via inline style and via a #rr-signin-modal
    // descendant rule for defense in depth.
    var SANS = '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif';

    var backdrop = document.createElement('div');
    backdrop.id = 'rr-signin-modal';
    backdrop.setAttribute('role', 'dialog');
    backdrop.setAttribute('aria-modal', 'true');
    backdrop.setAttribute('aria-labelledby', 'rr-signin-title');
    backdrop.style.cssText = [
      'position:fixed', 'inset:0', 'z-index:2147483647',
      'display:flex', 'align-items:center', 'justify-content:center',
      'background:rgba(15,23,42,0.55)',
      '-webkit-backdrop-filter:blur(6px)', 'backdrop-filter:blur(6px)',
      'animation:rrFadeIn 180ms ease-out',
      'font-family:' + SANS,
      'padding:16px', 'box-sizing:border-box'
    ].join(';');

    var card = document.createElement('div');
    card.style.cssText = [
      'background:#ffffff', 'border-radius:16px', 'padding:32px 28px 24px',
      'max-width:400px', 'width:100%',
      'box-shadow:0 25px 50px -12px rgba(0,0,0,0.45)',
      'position:relative', 'box-sizing:border-box',
      'animation:rrCardIn 220ms cubic-bezier(0.2,0.9,0.32,1)',
      'font-family:' + SANS
    ].join(';');

    // Inject keyframes + override-rules ONCE per page. The descendant rules
    // here are the defense against host-site CSS bleeding into modal text.
    if (!document.getElementById('rr-signin-keyframes')) {
      var style = document.createElement('style');
      style.id = 'rr-signin-keyframes';
      style.textContent =
        '@keyframes rrFadeIn{from{opacity:0}to{opacity:1}}' +
        '@keyframes rrCardIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}' +
        '#rr-signin-modal,#rr-signin-modal *{font-family:' + SANS + ' !important;letter-spacing:normal !important;font-style:normal !important;text-transform:none !important;}' +
        '#rr-signin-modal h2{font-family:' + SANS + ' !important;font-weight:600 !important;font-size:19px !important;line-height:1.25 !important;color:#0F1F3A !important;margin:0 0 6px !important;letter-spacing:-0.01em !important;}' +
        '#rr-signin-modal p{font-family:' + SANS + ' !important;font-weight:400 !important;color:#52606D !important;margin:0 !important;line-height:1.4 !important;}' +
        '#rr-signin-modal #rr-fb-modal-btn:hover{background:#F8F9FB !important;border-color:#C8CDD4 !important;}' +
        '#rr-signin-modal #rr-signin-close:hover{background:#F3F4F6 !important;}';
      document.head.appendChild(style);
    }

    var closeBtn = document.createElement('button');
    closeBtn.id = 'rr-signin-close';
    closeBtn.type = 'button';
    closeBtn.setAttribute('aria-label', 'Close sign-in');
    closeBtn.style.cssText = [
      'position:absolute', 'top:12px', 'right:12px',
      'width:30px', 'height:30px', 'padding:0',
      'background:transparent', 'border:0', 'border-radius:8px',
      'cursor:pointer', 'color:#9AA0A6',
      'display:flex', 'align-items:center', 'justify-content:center',
      'font-family:' + SANS
    ].join(';');
    closeBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';

    var title = document.createElement('h2');
    title.id = 'rr-signin-title';
    title.textContent = 'Welcome to Ryan Realty';

    var subtitle = document.createElement('p');
    subtitle.textContent = 'Continue and we’ll save your preferences and properties.';
    subtitle.style.cssText = 'font-size:14px !important;margin:0 0 22px !important;';

    var googleSlot = document.createElement('div');
    googleSlot.id = 'rr-google-slot';
    googleSlot.style.cssText = 'min-height:48px;display:flex;justify-content:center;margin-bottom:10px;';

    var fbBtn = document.createElement('button');
    fbBtn.id = 'rr-fb-modal-btn';
    fbBtn.type = 'button';
    fbBtn.style.cssText = [
      'display:flex', 'align-items:center', 'justify-content:center', 'gap:10px',
      'width:100%', 'padding:0 16px', 'box-sizing:border-box',
      'border-radius:6px', 'border:1px solid #DADCE0', 'background:#ffffff',
      'cursor:pointer', 'font-size:14px', 'font-weight:500', 'color:#3C4043',
      'transition:background 120ms,border-color 120ms', 'height:48px',
      'font-family:' + SANS,
      'letter-spacing:0.25px'
    ].join(';');
    fbBtn.innerHTML =
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true" style="flex-shrink:0;"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>' +
      '<span style="font-family:' + SANS + ';font-weight:500;">Continue with Facebook</span>';
    fbBtn.addEventListener('click', function() {
      if (!window.FB) return;
      FB.login(function(response) {
        if (response && response.authResponse && response.authResponse.accessToken) {
          hideSignInModal({ keepDismissFlag: false });
          identify({ provider: 'facebook', accessToken: response.authResponse.accessToken });
        }
      }, { scope: 'email,public_profile' });
    });

    var fineprint = document.createElement('p');
    fineprint.style.cssText = 'margin:18px 0 0 !important;font-size:11px !important;color:#9AA0A6 !important;text-align:center !important;line-height:1.45 !important;';
    fineprint.textContent = 'No password required. We never post on your behalf.';

    card.appendChild(closeBtn);
    card.appendChild(title);
    card.appendChild(subtitle);
    card.appendChild(googleSlot);
    if (cfg.enableFacebookButton) card.appendChild(fbBtn);
    card.appendChild(fineprint);
    backdrop.appendChild(card);
    document.body.appendChild(backdrop);

    // Render Google button into its slot. Match the FB button width (full row
    // minus 56px horizontal padding) so the two buttons line up edge-to-edge.
    if (window.google && window.google.accounts && window.google.accounts.id) {
      try {
        var btnWidth = Math.max(280, Math.min(344, (card.clientWidth || 400) - 56));
        google.accounts.id.renderButton(googleSlot, {
          type: 'standard',
          theme: 'outline',
          size: 'large',
          text: 'continue_with',
          shape: 'rectangular',
          logo_alignment: 'left',
          width: btnWidth,
        });
      } catch (e) {}
    }

    // Dismiss handlers
    function dismissModal() { hideSignInModal({ keepDismissFlag: true }); }
    closeBtn.addEventListener('click', dismissModal);
    backdrop.addEventListener('click', function(e) { if (e.target === backdrop) dismissModal(); });
    document.addEventListener('keydown', function escHandler(e) {
      if (e.key === 'Escape' && document.getElementById('rr-signin-modal')) {
        dismissModal();
        document.removeEventListener('keydown', escHandler);
      }
    });
  }

  function hideSignInModal(opts) {
    var el = document.getElementById('rr-signin-modal');
    if (el) el.remove();
    if (opts && opts.keepDismissFlag) {
      try { sessionStorage.setItem('rr_signin_dismissed', '1'); } catch (e) {}
    }
  }

  // Globally expose the trigger so any AgentFire CTA / button on the page
  // can re-open the modal: <a onclick="window.rrShowSignIn()">Sign in</a>
  window.rrShowSignIn = function() {
    try { sessionStorage.removeItem('rr_signin_dismissed'); } catch (e) {}
    showSignInModal();
  };

  // ---------- Page tracking ----------

  // Try to read property metadata from JSON-LD schema embedded in the page
  // (AgentFire IDX listing detail pages emit RealEstateListing / House /
  // SingleFamilyResidence / Apartment schema). Falls back to URL pattern +
  // page DOM heuristics for sites that don't emit schema.
  function extractListingMeta() {
    function pick(obj, keys) {
      for (var i = 0; i < keys.length; i++) {
        var v = obj && obj[keys[i]];
        if (v != null && v !== '') return v;
      }
      return undefined;
    }
    function asNum(v) {
      if (typeof v === 'number') return v;
      if (typeof v === 'string') {
        var n = parseFloat(v.replace(/[^0-9.]/g, ''));
        return Number.isFinite(n) ? n : undefined;
      }
      return undefined;
    }

    var listingTypes = {
      RealEstateListing: 1, Residence: 1, House: 1, SingleFamilyResidence: 1,
      Apartment: 1, Condominium: 1, Townhouse: 1, Place: 0
    };
    var scripts = document.querySelectorAll('script[type="application/ld+json"]');
    for (var i = 0; i < scripts.length; i++) {
      var raw;
      try { raw = JSON.parse(scripts[i].textContent || '{}'); } catch (e) { continue; }
      var nodes = Array.isArray(raw) ? raw : [raw];
      // Walk @graph if present
      for (var k = 0; k < nodes.length; k++) {
        if (nodes[k] && Array.isArray(nodes[k]['@graph'])) {
          nodes = nodes.concat(nodes[k]['@graph']);
        }
      }
      for (var j = 0; j < nodes.length; j++) {
        var n = nodes[j];
        if (!n || typeof n !== 'object') continue;
        var t = n['@type'];
        if (Array.isArray(t)) t = t[0];
        if (!t || !listingTypes[t]) continue;
        var addr = n.address || {};
        var offers = n.offers || {};
        var meta = {
          street: pick(addr, ['streetAddress']) || pick(n, ['name']),
          city: pick(addr, ['addressLocality']),
          state: pick(addr, ['addressRegion']),
          code: pick(addr, ['postalCode']),
          mlsNumber: pick(n, ['identifier', 'mlsNumber', 'mlsId']),
          price: asNum(pick(offers, ['price', 'priceSpecification']) || pick(n, ['price'])),
          bedrooms: asNum(pick(n, ['numberOfBedrooms', 'numberOfBedroomTotal'])),
          bathrooms: asNum(pick(n, ['numberOfBathroomsTotal', 'numberOfBathrooms'])),
          area: asNum(n.floorSize && (n.floorSize.value || n.floorSize)),
        };
        if (meta.mlsNumber || meta.street) return meta;
      }
    }
    // URL heuristic — only treat as a real listing detail when the path looks
    // like the AgentFire IDX pattern (/listing/<source>/<mls-id>/...) or a
    // similar /property/<id>/ pattern with a numeric id segment. The bare
    // /listings/ index and 404 pages should NOT be flagged as listing detail.
    var listingDetailRe = /\/listing\/[a-z0-9_-]+\/[a-z0-9_-]+/i;
    var altListingRe = /\/property\/[a-z0-9_-]+/i;
    if (listingDetailRe.test(window.location.pathname) || altListingRe.test(window.location.pathname)) {
      // Guard: page title or H1 indicating a 404 / error page disqualifies.
      var pageTitle = document.title || '';
      if (/not found|404|page not found|error/i.test(pageTitle)) return null;
      var h1 = document.querySelector('h1');
      var h1Text = h1 ? h1.textContent.trim() : '';
      if (!h1Text || /not found|404|error/i.test(h1Text)) return null;
      // Real US addresses start with a number. If H1 doesn't contain a digit,
      // it's likely a category page or banner, not a property address.
      if (!/\d/.test(h1Text)) return null;
      // Try to enrich with city / state from the document title if present
      // (AgentFire titles tend to follow "<address>, <City>, <ST> <ZIP>" form).
      var titleMatch = pageTitle.match(/^([^,]+),\s*([^,]+),\s*([A-Z]{2})\s*(\d{5})?/i);
      var meta = { street: h1Text.slice(0, 200) };
      if (titleMatch) {
        meta.city = (titleMatch[2] || '').trim() || undefined;
        meta.state = (titleMatch[3] || '').trim().toUpperCase() || undefined;
        if (titleMatch[4]) meta.code = titleMatch[4].trim();
      }
      // Pull MLS id from the URL when in AgentFire pattern.
      var mlsMatch = window.location.pathname.match(/\/listing\/[a-z]+\/(\d+)/i);
      if (mlsMatch) meta.mlsNumber = mlsMatch[1];
      return meta;
    }
    return null;
  }

  function trackPage(fubPersonId) {
    if (!fubPersonId) return;
    var listing = null;
    try { listing = extractListingMeta(); } catch (e) {}
    var src = captureSource();
    var campaign = buildCampaign(src);
    var cat;
    try { cat = categorizePage(); } catch (e) { cat = { category: 'other', intentTags: [] }; }
    // Override the category if we found real listing meta — listing detail
    // wins over any other URL match.
    if (listing && (listing.mlsNumber || listing.street)) {
      cat = { category: 'listing_detail', intentTags: ['Property View'] };
    }
    // Add a city tag when on a listing detail with a known city — gives Matt
    // "people who viewed a Bend listing" segmentation in FUB.
    if (cat.category === 'listing_detail' && listing && listing.city) {
      cat.intentTags = (cat.intentTags || []).concat(['Area: ' + String(listing.city).slice(0, 60)]);
    }
    var payload = {
      fubPersonId: Number(fubPersonId),
      pageUrl: window.location.href,
      pageTitle: (document.title || '').slice(0, 200),
      listing: listing,
      campaign: campaign,
      category: cat.category,
      intentTags: cat.intentTags,
    };
    fetch(cfg.trackEndpoint, {
      method: 'POST',
      mode: 'cors',
      credentials: 'omit',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true,
    }).catch(function() { /* swallow — never block the page */ });
    // Mirror the event into GTM dataLayer + FB Pixel for ad audiences.
    pushDataLayer({
      event: 'rr_page_view',
      rr_fub_person_id: Number(fubPersonId),
      rr_category: cat.category,
      rr_intent_tags: (cat.intentTags || []).join(','),
      rr_listing_mls: listing && listing.mlsNumber || undefined,
      rr_listing_city: listing && listing.city || undefined,
      rr_listing_state: listing && listing.state || undefined,
      rr_source: src.utmSource,
      rr_medium: src.utmMedium,
    });
    if (cat.category === 'listing_detail' && listing) {
      fbPixelEvent('ViewedProperty', {
        mls: listing.mlsNumber, city: listing.city, state: listing.state,
      });
    } else if (cat.category === 'seller_intent') {
      fbPixelEvent('SellerIntent', { url: window.location.pathname });
    } else if (cat.category === 'buyer_intent') {
      fbPixelEvent('BuyerIntent', { url: window.location.pathname });
    } else if (cat.category === 'area_guide') {
      fbPixelEvent('AreaGuide', { area: (cat.intentTags || []).join(',') });
    }
  }

  // Skip prompts if we identified this visitor recently.
  var cookieValue = getCookie(cfg.cookieName);
  var alreadyIdentified = !!cookieValue && cookieValue !== '1';
  var existingFubPersonId = alreadyIdentified ? Number(cookieValue) : null;
  if (alreadyIdentified && Number.isFinite(existingFubPersonId)) {
    // Returning visitor — fire the page-tracking event immediately. No
    // sign-in modal — the cookie already says we know who they are.
    trackPage(existingFubPersonId);
  }

  // Initialize Google Identity Services so the modal can render the
  // "Continue with Google" button when shown.
  function initGoogleAndModalSchedule() {
    if (!window.google || !window.google.accounts || !window.google.accounts.id) {
      setTimeout(initGoogleAndModalSchedule, 100);
      return;
    }
    google.accounts.id.initialize({
      client_id: cfg.googleClientId,
      callback: function(response) {
        hideSignInModal({ keepDismissFlag: false });
        identify({ provider: 'google', idToken: response.credential });
      },
      auto_select: false,
      cancel_on_tap_outside: true,
      context: 'signin',
      itp_support: true,
    });

    // Schedule the modal for non-identified visitors. Source-aware: visitors
    // arriving from Facebook see the modal almost immediately (since the FB
    // CTA is what they're expecting to find); everyone else gets a brief
    // ~1.5s delay so they see the page content first.
    if (!alreadyIdentified) {
      var src;
      try { src = captureSource(); } catch (e) { src = {}; }
      var cameFromFB = (src.utmSource && /facebook|instagram/i.test(src.utmSource));
      var delay = cameFromFB ? 300 : 1500;
      setTimeout(function() {
        // Re-check the cookie just before showing — silent re-auth or another
        // tab may have identified the visitor in the meantime.
        var current = getCookie(cfg.cookieName);
        if (!current || current === '1') {
          showSignInModal();
        }
      }, delay);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGoogleAndModalSchedule);
  } else {
    initGoogleAndModalSchedule();
  }

  // Expose for any custom button on the page (e.g. AgentFire CTA blocks).
  window.rrFacebookLogin = function() {
    if (!window.FB) return;
    FB.login(function(response) {
      if (response && response.authResponse && response.authResponse.accessToken) {
        hideSignInModal({ keepDismissFlag: false });
        identify({ provider: 'facebook', accessToken: response.authResponse.accessToken });
      }
    }, { scope: 'email,public_profile' });
  };
})();
</script>
