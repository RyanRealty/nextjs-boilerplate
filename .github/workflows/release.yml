name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run on actual merges, not direct pushes of CI artifacts
        if: "github.event.head_commit.message != 'chore: update changelog'"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine version bump
        id: version
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            # No tags yet — start at 1.0.0
            echo "new_version=1.0.0" >> $GITHUB_OUTPUT
            echo "is_first=true" >> $GITHUB_OUTPUT
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline)
          fi

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qiE "^[a-f0-9]+ feat(\(|:)"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^[a-f0-9]+ fix(\(|:)"; then
            BUMP="patch"
          else
            BUMP="patch"
          fi

          if [ -n "$LAST_TAG" ]; then
            # Parse semver
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
            case $BUMP in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            echo "new_version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges)
          fi

          # Group commits by type
          FEATURES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat(\(|:)" | sed 's/^[a-f0-9]* /- /' || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ fix(\(|:)" | sed 's/^[a-f0-9]* /- /' || true)
          CHORES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ (chore|refactor|style|perf|docs|test)(\(|:)" | sed 's/^[a-f0-9]* /- /' || true)
          OTHER=$(echo "$COMMITS" | grep -viE "^[a-f0-9]+ (feat|fix|chore|refactor|style|perf|docs|test)(\(|:)" | sed 's/^[a-f0-9]* /- /' || true)

          # Build release notes
          NOTES="## v${NEW_VERSION} (${DATE})\n"

          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}\n### Features\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}\n### Bug Fixes\n${FIXES}\n"
          fi
          if [ -n "$CHORES" ]; then
            NOTES="${NOTES}\n### Maintenance\n${CHORES}\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}\n### Other\n${OTHER}\n"
          fi

          # Write to file for the release body
          echo -e "$NOTES" > /tmp/release-notes.md

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            echo -e "# Changelog\n\n${NOTES}\n---\n" > /tmp/new-changelog.md
            # Remove the first "# Changelog" line from existing file
            tail -n +2 CHANGELOG.md >> /tmp/new-changelog.md
            mv /tmp/new-changelog.md CHANGELOG.md
          else
            echo -e "# Changelog\n\n${NOTES}" > CHANGELOG.md
          fi

          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog"
          git push

      - name: Create tag and release
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
