name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:seo-routes
      - run: npm run ci:design-tokens
      - run: npm run test
      - run: npm run build

      # Save build for downstream jobs
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

      # Build health tracking
      - name: Record build health metrics
        if: always()
        run: |
          npx tsx scripts/track-build-health.ts 2>/dev/null || true

      - run: npm run ci:lighthouse
      - run: npm run ci:a11y

      # Bundle size report
      - name: Report bundle sizes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Parse .next/routes-manifest.json or build output for route sizes
            let report = '## 📦 Bundle Size Report\n\n';

            // Read the build trace if available
            try {
              const buildDir = '.next';
              const appDir = path.join(buildDir, 'server', 'app');

              if (fs.existsSync(appDir)) {
                const routes = [];
                function walk(dir, prefix = '') {
                  const entries = fs.readdirSync(dir, { withFileTypes: true });
                  for (const entry of entries) {
                    const full = path.join(dir, entry.name);
                    if (entry.isDirectory()) {
                      walk(full, prefix + '/' + entry.name);
                    } else if (entry.name.endsWith('.js') || entry.name.endsWith('.html')) {
                      const stats = fs.statSync(full);
                      const sizeKB = (stats.size / 1024).toFixed(1);
                      routes.push({ route: prefix + '/' + entry.name, sizeKB: parseFloat(sizeKB) });
                    }
                  }
                }
                walk(appDir);

                // Sort by size descending
                routes.sort((a, b) => b.sizeKB - a.sizeKB);

                // Show top 15 largest
                report += '| Route | Size |\n';
                report += '|-------|------|\n';
                for (const r of routes.slice(0, 15)) {
                  const warn = r.sizeKB > 250 ? ' ⚠️' : '';
                  report += `| \`${r.route}\` | ${r.sizeKB} KB${warn} |\n`;
                }

                const totalKB = routes.reduce((sum, r) => sum + r.sizeKB, 0).toFixed(1);
                const largeRoutes = routes.filter(r => r.sizeKB > 250);
                report += `\n**Total**: ${totalKB} KB across ${routes.length} routes`;
                if (largeRoutes.length > 0) {
                  report += `\n\n⚠️ **${largeRoutes.length} route(s) exceed 250 KB** — consider code splitting`;
                }
              } else {
                report += '_Build output not found for analysis._';
              }
            } catch (e) {
              report += `_Error analyzing build: ${e.message}_`;
            }

            report += '\n\n---\n*Auto-generated by CI*';

            // Post or update comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes('Bundle Size Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report,
              });
            }

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-build
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Download the build from the previous job
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      # Install only chromium for speed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Run E2E tests (critical flows only — visual regression needs baselines)
      - name: Run E2E tests
        run: npx playwright test e2e/critical-flows.spec.ts --project=chromium

      # Upload test artifacts on failure
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            e2e/test-results/
            e2e/html-report/
          retention-days: 7

      # Run visual regression (allow failure until baselines are committed)
      - name: Run visual regression tests
        continue-on-error: true
        run: npx playwright test e2e/visual-regression.spec.ts --project=chromium

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            e2e/test-results/
            e2e/html-report/
          retention-days: 7
