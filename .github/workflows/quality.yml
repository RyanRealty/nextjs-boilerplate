name: "Quality checks (nightly)"

on:
  schedule:
    # Run every night at 3:00 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SKYSLOPE_ACCESS_KEY: ${{ secrets.SKYSLOPE_ACCESS_KEY }}
      SKYSLOPE_ACCESS_SECRET: ${{ secrets.SKYSLOPE_ACCESS_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Lighthouse CI
      - name: Lighthouse CI
        run: npm run ci:lighthouse

      # Accessibility (pa11y)
      - name: Accessibility (pa11y)
        run: npm run ci:a11y
