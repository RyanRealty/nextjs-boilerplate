<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tumalo Reservoir Photo Picker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;padding:16px}
.wrap{max-width:900px;margin:0 auto}
.bar{position:sticky;top:0;z-index:10;background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.bar-left{display:flex;align-items:center;gap:12px}
.count{font-size:15px;font-weight:600;color:#102742}
.copied{font-size:13px;color:#639922;opacity:0;transition:opacity .3s}
.copied.show{opacity:1}
.btn{font-size:13px;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;background:#eee;color:#666}
.btn:hover{background:#ddd}
.section{font-size:14px;font-weight:600;color:#102742;margin:20px 0 8px;padding-bottom:6px;border-bottom:2px solid #D4AF37}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.item{position:relative;cursor:pointer;border-radius:8px;overflow:hidden;border:3px solid transparent;transition:border-color .15s;aspect-ratio:4/3;background:#ddd}
.item:hover{border-color:#aaa}
.item.sel{border-color:#D4AF37}
.item img{width:100%;height:100%;object-fit:cover;display:block}
.num{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;pointer-events:none}
.check{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:#D4AF37;display:none;align-items:center;justify-content:center}
.item.sel .check{display:flex}
.check svg{width:16px;height:16px}
.result{margin:0 0 16px;padding:12px 16px;background:#fff;border-radius:8px;font-size:14px;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.1);display:none;word-break:break-all}
.result b{color:#102742}
h1{font-size:20px;color:#102742;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
<h1>19496 Tumalo Reservoir Rd</h1>
<p class="sub">Tap photos to select. Numbers auto-copy to clipboard. Paste them in chat.</p>
<div class="bar">
<div class="bar-left">
<span class="count" id="count">0 selected</span>
<span class="copied" id="copied">Copied!</span>
</div>
<button class="btn" onclick="clearAll()">Clear all</button>
</div>
<div class="result" id="result">Selected: <b id="resultNums"></b></div>
<div class="section">Drone / Aerial</div>
<div class="grid" id="g-drone"></div>
<div class="section">Twilight / Dusk</div>
<div class="grid" id="g-twi"></div>
<div class="section">Interior / Exterior</div>
<div class="grid" id="g-int"></div>
</div>
<script>
var photos=[{n:1,u:"20260304175719779563000000",t:"drone"},{n:2,u:"20260304175825195222000000",t:"drone"},{n:3,u:"20260304175720531554000000",t:"drone"},{n:4,u:"20260304175815521055000000",t:"drone"},{n:5,u:"20260304175723357841000000",t:"drone"},{n:6,u:"20260304175724080591000000",t:"drone"},{n:7,u:"20260307035352655634000000",t:"drone"},{n:8,u:"20260307035353837808000000",t:"drone"},{n:9,u:"20260307035354882604000000",t:"drone"},{n:10,u:"20260307035355966246000000",t:"drone"},{n:51,u:"20260304175816653802000000",t:"drone"},{n:52,u:"20260304175817715917000000",t:"drone"},{n:53,u:"20260304175818830865000000",t:"drone"},{n:54,u:"20260304175821068293000000",t:"drone"},{n:55,u:"20260304175823191551000000",t:"drone"},{n:56,u:"20260304175824165884000000",t:"drone"},{n:57,u:"20260304175826270250000000",t:"drone"},{n:58,u:"20260304175827351802000000",t:"drone"},{n:59,u:"20260304175837337281000000",t:"drone"},{n:60,u:"20260304175842036355000000",t:"drone"},{n:61,u:"20260304175843630562000000",t:"drone"},{n:62,u:"20260304175847763953000000",t:"drone"},{n:63,u:"20260304175849200773000000",t:"drone"},{n:11,u:"20260307035346916059000000",t:"twi"},{n:12,u:"20260307035347683842000000",t:"twi"},{n:13,u:"20260307035348505560000000",t:"twi"},{n:14,u:"20260307035349816141000000",t:"twi"},{n:15,u:"20260307035350684394000000",t:"twi"},{n:16,u:"20260307035351594693000000",t:"twi"},{n:17,u:"20260304175725529629000000",t:"int"},{n:18,u:"20260304175728975287000000",t:"int"},{n:19,u:"20260304175726424615000000",t:"int"},{n:20,u:"20260304175733346160000000",t:"int"},{n:21,u:"20260304175741090616000000",t:"int"},{n:22,u:"20260304175741900992000000",t:"int"},{n:23,u:"20260304175735852429000000",t:"int"},{n:24,u:"20260304175740163814000000",t:"int"},{n:25,u:"20260304175744600559000000",t:"int"},{n:26,u:"20260304175746136817000000",t:"int"},{n:27,u:"20260304175749053509000000",t:"int"},{n:28,u:"20260304175750410521000000",t:"int"},{n:29,u:"20260304175751891299000000",t:"int"},{n:30,u:"20260304175752675828000000",t:"int"},{n:31,u:"20260304175754096259000000",t:"int"},{n:32,u:"20260304175756315481000000",t:"int"},{n:33,u:"20260304175757126024000000",t:"int"},{n:34,u:"20260304175757962227000000",t:"int"},{n:35,u:"20260304175758713836000000",t:"int"},{n:36,u:"20260304175759611818000000",t:"int"},{n:37,u:"20260304175800389329000000",t:"int"},{n:38,u:"20260304175801123863000000",t:"int"},{n:39,u:"20260304175801918017000000",t:"int"},{n:40,u:"20260304175803691109000000",t:"int"},{n:41,u:"20260304175804466025000000",t:"int"},{n:42,u:"20260304175805363152000000",t:"int"},{n:43,u:"20260304175808048886000000",t:"int"},{n:44,u:"20260304175809406823000000",t:"int"},{n:45,u:"20260304175810648732000000",t:"int"},{n:46,u:"20260304175811849995000000",t:"int"},{n:47,u:"20260304175813645287000000",t:"int"},{n:48,u:"20260304175814490078000000",t:"int"},{n:49,u:"20260304175743791453000000",t:"int"},{n:50,u:"20260304175742857429000000",t:"int"}];
var selected=new Set(),timer=null;
function makeCard(p){var d=document.createElement("div");d.className="item";d.innerHTML='<img src="https://cdn.resize.sparkplatform.com/ore/640x480/true/'+p.u+'-o.jpg" loading="lazy" alt="Photo '+p.n+'"><span class="num">'+p.n+'</span><div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>';d.addEventListener("click",function(){toggle(p.n,d)});return d}
function toggle(num,el){if(selected.has(num)){selected.delete(num);el.classList.remove("sel")}else{selected.add(num);el.classList.add("sel")}updateUI()}
function updateUI(){var arr=Array.from(selected).sort(function(a,b){return a-b});var txt=arr.join(", ");document.getElementById("count").textContent=arr.length+" selected";if(arr.length>0){document.getElementById("result").style.display="block";document.getElementById("resultNums").textContent=txt;navigator.clipboard.writeText(txt).then(function(){var c=document.getElementById("copied");c.classList.add("show");clearTimeout(timer);timer=setTimeout(function(){c.classList.remove("show")},1500)}).catch(function(){})}else{document.getElementById("result").style.display="none";document.getElementById("copied").classList.remove("show")}}
function clearAll(){selected.clear();document.querySelectorAll(".item.sel").forEach(function(el){el.classList.remove("sel")});updateUI()}
var gDrone=document.getElementById("g-drone"),gTwi=document.getElementById("g-twi"),gInt=document.getElementById("g-int");
photos.forEach(function(p){var card=makeCard(p);if(p.t==="drone")gDrone.appendChild(card);else if(p.t==="twi")gTwi.appendChild(card);else gInt.appendChild(card)});
</script>
</body>
</html>
