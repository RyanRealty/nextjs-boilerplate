<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- Earnest. canonical wordmark lockup
       Vertical frame 1080x1920 (TikTok / Reels / Shorts native).
       Locked 2026-05-07. Do not modify without brand-system review. -->

  <!-- Background: Ink -->
  <rect width="1080" height="1920" fill="#0B0F14"/>

  <!-- Horizon mark: the threshold line.
       Reads as doorway, property line, the moment before crossing.
       Width 280px (~26% of frame width). 4px stroke. Square caps.
       Color: Bone. -->
  <line x1="400" y1="900" x2="680" y2="900"
        stroke="#E8E2D6" stroke-width="4" stroke-linecap="square"/>

  <!-- Wordmark "Earnest."
       Inter Display Black, 200pt, tight tracking (-12).
       The period in Ember is the only colored element.
       Centered horizontally. Baseline at y=1100. -->
  <text x="540" y="1100"
        font-family="'Inter Display', 'Inter', 'Söhne', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="900" font-size="200" letter-spacing="-12"
        text-anchor="middle"
        fill="#E8E2D6">Earnest<tspan fill="#B25535">.</tspan></text>
</svg>
