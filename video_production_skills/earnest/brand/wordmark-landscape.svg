<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Earnest. wordmark, landscape 16:9.
       For YouTube long-form thumbnails, microsite hero, festival submission masters. -->

  <rect width="1920" height="1080" fill="#0B0F14"/>

  <line x1="820" y1="460" x2="1100" y2="460"
        stroke="#E8E2D6" stroke-width="4" stroke-linecap="square"/>

  <text x="960" y="640"
        font-family="'Inter Display', 'Inter', 'Söhne', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="900" font-size="180" letter-spacing="-10"
        text-anchor="middle"
        fill="#E8E2D6">Earnest<tspan fill="#B25535">.</tspan></text>
</svg>
