<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Earnest. wordmark, square crop.
       For social avatars, podcast cover art, square previews. -->

  <rect width="1080" height="1080" fill="#0B0F14"/>

  <line x1="400" y1="480" x2="680" y2="480"
        stroke="#E8E2D6" stroke-width="4" stroke-linecap="square"/>

  <text x="540" y="660"
        font-family="'Inter Display', 'Inter', 'Söhne', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="900" font-size="180" letter-spacing="-10"
        text-anchor="middle"
        fill="#E8E2D6">Earnest<tspan fill="#B25535">.</tspan></text>
</svg>
